<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04080f"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="radial1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#radial1)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#6366f1" fill-opacity="0.06"/>
  <circle cx="150" cy="500" r="150" fill="#3b82f6" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="100" fill="#10b981" fill-opacity="0.04"/>

  <!-- Logo badge -->
  <rect x="80" y="72" width="160" height="48" rx="12" fill="url(#badge)"/>
  <text x="160" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5">Emploia</text>

  <!-- France flag indicator -->
  <rect x="260" y="80" width="32" height="32" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="276" y="102" font-size="18" text-anchor="middle">🇫🇷</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="-2.5">Le copilote IA</text>
  <text x="80" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="url(#badge)" letter-spacing="-2.5">100% français</text>
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="-2.5">pour l'emploi.</text>

  <!-- Subline -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8" letter-spacing="-0.3">CV ATS-optimisé · Lettre de motivation · Coaching entretien</text>

  <!-- Stats chips -->
  <rect x="80" y="500" width="220" height="52" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="190" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#a5b4fc" text-anchor="middle">30 secondes / CV</text>

  <rect x="316" y="500" width="210" height="52" rx="12" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="421" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6ee7b7" text-anchor="middle">2.4× d'entretiens</text>

  <rect x="542" y="500" width="180" height="52" rx="12" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="632" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#93c5fd" text-anchor="middle">Gratuit / 9€</text>

  <!-- Right side — score card visual -->
  <rect x="820" y="160" width="320" height="300" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Score -->
  <text x="980" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">94</text>
  <text x="980" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">/100 — Score ATS</text>

  <!-- Progress bar -->
  <rect x="860" y="310" width="240" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="860" y="310" width="226" height="8" rx="4" fill="url(#badge)"/>

  <!-- Chips -->
  <rect x="865" y="335" width="98" height="30" rx="8" fill="rgba(16,185,129,0.15)"/>
  <text x="914" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">✓ ATS-ready</text>

  <rect x="973" y="335" width="105" height="30" rx="8" fill="rgba(99,102,241,0.15)"/>
  <text x="1025" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" text-anchor="middle">Mots-clés ✓</text>

  <!-- emploia.fr watermark -->
  <text x="1160" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#475569" text-anchor="end" letter-spacing="-0.3">emploia.fr</text>
</svg>
