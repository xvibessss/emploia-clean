name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  js-syntax:
    name: JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Check API files syntax
        run: |
          failed=0
          while IFS= read -r f; do
            node --check "$f" 2>&1 || failed=1
          done < <(find api -name "*.js")
          [ $failed -eq 0 ] && echo "All JS files OK" || exit 1

  html-lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install htmlhint
        run: npm install -g htmlhint
      - name: Run htmlhint on HTML pages
        run: |
          htmlhint --config .htmlhintrc \
            "*.html" "blog/*.html" "emploi/*.html" "metier/*.html"
