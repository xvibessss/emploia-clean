name: Link Check

on:
  schedule:
    # Every Sunday at 7h UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  link-check:
    name: Check broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --base https://emploia-clean.vercel.app
            --exclude "^https://emploia-clean\.vercel\.app/(app|dashboard|profil|chat|cv-vault|alerts|apply-queue)"
            --exclude "^https://emploia\.fr"
            --exclude "^https://fonts\."
            --exclude "^https://plausible\.io"
            --exclude "^https://js\.stripe\.com"
            --timeout 20
            --retry-wait-time 5
            --max-retries 2
            "*.html"
            "blog/*.html"
            "emploi/*.html"
            "metier/*.html"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
