name: Lighthouse Audit

on:
  schedule:
    # Every Monday at 8h UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse on key pages
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://emploia-clean.vercel.app/
            https://emploia-clean.vercel.app/blog
            https://emploia-clean.vercel.app/tools
            https://emploia-clean.vercel.app/cv-builder
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
