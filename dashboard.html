<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emploia — Suivi de candidatures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --indigo-600: #4f46e5;
      --violet-600: #7c3aed;
      --green-50: #f0fdf4;
      --green-100: #dcfce7;
      --green-600: #16a34a;
      --green-700: #15803d;
      --yellow-50: #fefce8;
      --yellow-100: #fef9c3;
      --yellow-600: #ca8a04;
      --orange-50: #fff7ed;
      --orange-100: #ffedd5;
      --orange-600: #ea580c;
      --red-50: #fef2f2;
      --red-100: #fee2e2;
      --red-600: #dc2626;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --white: #ffffff;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.10);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--slate-800);
      background: #f1f5f9;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--slate-200);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-size: 17px; font-weight: 800; color: var(--slate-900);
      text-decoration: none; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-mark {
      width: 26px; height: 26px; border-radius: 6px;
      background: linear-gradient(135deg, var(--blue-600), var(--indigo-600));
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 13px; font-weight: 900;
    }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .btn-ghost {
      padding: 7px 12px; border-radius: 7px; font-size: 13px; font-weight: 500;
      color: var(--slate-600); cursor: pointer; border: none; background: none;
      text-decoration: none; transition: all .15s;
    }
    .btn-ghost:hover { background: var(--slate-100); color: var(--slate-800); }
    .btn-ghost.active { background: var(--blue-50); color: var(--blue-700); font-weight: 600; }
    .btn-primary {
      padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
      color: white; background: var(--blue-600); border: none; cursor: pointer;
      text-decoration: none; transition: all .15s;
    }
    .btn-primary:hover { background: var(--blue-700); }

    /* ── HEADER ── */
    .page-header {
      max-width: 1400px; margin: 0 auto;
      padding: 28px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .page-title { font-size: 22px; font-weight: 800; color: var(--slate-900); letter-spacing: -.5px; }
    .page-subtitle { font-size: 13px; color: var(--slate-500); margin-top: 3px; }

    /* ── STATS BAR ── */
    .stats-bar {
      max-width: 1400px; margin: 0 auto;
      padding: 20px 24px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .stat-card {
      background: white; border: 1px solid var(--slate-200);
      border-radius: var(--radius); padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      flex: 1; min-width: 130px;
    }
    .stat-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--slate-900); letter-spacing: -.5px; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--slate-400); margin-top: 3px; font-weight: 500; }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px; max-width: 320px;
      padding: 8px 14px; border-radius: 8px;
      border: 1.5px solid var(--slate-200); background: white;
      font-size: 13px; color: var(--slate-700); font-family: inherit;
      transition: border-color .15s;
    }
    .search-input:focus { outline: none; border-color: var(--blue-400); }
    .search-input::placeholder { color: var(--slate-400); }
    .filter-select {
      padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid var(--slate-200); background: white;
      font-size: 13px; color: var(--slate-700); font-family: inherit;
      cursor: pointer;
    }
    .filter-select:focus { outline: none; }
    .btn-add {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
      color: white; background: var(--blue-600); border: none; cursor: pointer;
      transition: all .15s; display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--blue-700); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }

    /* ── KANBAN BOARD ── */
    .board {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .column {
      background: var(--slate-100);
      border-radius: 12px;
      padding: 0;
      display: flex; flex-direction: column;
      min-height: 500px;
    }
    .column-header {
      padding: 14px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid transparent;
    }
    .column-title-row { display: flex; align-items: center; gap: 8px; }
    .column-dot { width: 8px; height: 8px; border-radius: 50%; }
    .column-title { font-size: 13px; font-weight: 700; color: var(--slate-700); }
    .column-count {
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 100px;
    }
    .col-add-btn {
      width: 26px; height: 26px; border-radius: 6px;
      border: none; background: transparent; cursor: pointer;
      color: var(--slate-400); font-size: 18px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; line-height: 1;
    }
    .col-add-btn:hover { background: var(--slate-200); color: var(--slate-700); }

    /* Column themes */
    .col-todo .column-header { border-color: var(--slate-300); }
    .col-todo .column-dot { background: var(--slate-400); }
    .col-todo .column-count { background: var(--slate-200); color: var(--slate-600); }

    .col-applied .column-header { border-color: var(--blue-500); }
    .col-applied .column-dot { background: var(--blue-500); }
    .col-applied .column-count { background: var(--blue-100); color: var(--blue-700); }

    .col-interview .column-header { border-color: #f59e0b; }
    .col-interview .column-dot { background: #f59e0b; }
    .col-interview .column-count { background: var(--yellow-100); color: var(--yellow-600); }

    .col-result .column-header { border-color: var(--green-600); }
    .col-result .column-dot { background: var(--green-600); }
    .col-result .column-count { background: var(--green-100); color: var(--green-700); }

    /* ── CARDS ── */
    .column-cards {
      padding: 10px 10px 10px;
      flex: 1;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 80px;
    }
    .column-cards.drag-over {
      background: rgba(59,130,246,.05);
      border-radius: 8px;
    }

    .card {
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: 10px;
      padding: 14px;
      cursor: grab;
      transition: all .2s;
      position: relative;
      animation: cardIn .2s ease;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--slate-300); transform: translateY(-1px); }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: .4; transform: scale(.98); }

    .card-priority {
      position: absolute; top: 10px; right: 10px;
      font-size: 14px; cursor: pointer;
    }
    .card-company { font-size: 11px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--slate-800); line-height: 1.3; margin-bottom: 10px; padding-right: 20px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .card-tag {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
    }
    .tag-type { background: var(--blue-50); color: var(--blue-700); }
    .tag-remote { background: var(--green-50); color: var(--green-700); }
    .tag-salary { background: var(--slate-100); color: var(--slate-600); }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px;
    }
    .card-date { font-size: 11px; color: var(--slate-400); }
    .card-actions { display: flex; gap: 4px; }
    .card-btn {
      width: 24px; height: 24px; border-radius: 5px;
      border: none; background: transparent; cursor: pointer;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      color: var(--slate-400); transition: all .15s;
    }
    .card-btn:hover { background: var(--slate-100); color: var(--slate-700); }
    .card-btn.delete:hover { background: var(--red-50); color: var(--red-600); }

    .card-notes {
      font-size: 12px; color: var(--slate-500); line-height: 1.5;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--slate-100);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-result-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; margin-top: 8px;
    }
    .result-accepted { background: var(--green-100); color: var(--green-700); }
    .result-refused { background: var(--red-100); color: var(--red-600); }

    /* Empty state */
    .column-empty {
      padding: 28px 16px; text-align: center;
      color: var(--slate-400); font-size: 13px; line-height: 1.6;
      border: 2px dashed var(--slate-200); border-radius: 8px; margin: 4px;
    }
    .column-empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(15,23,42,.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: white; border-radius: 16px;
      padding: 28px; width: 100%; max-width: 560px;
      box-shadow: var(--shadow-lg);
      animation: slideUp .2s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 18px; font-weight: 800; color: var(--slate-900); letter-spacing: -.5px; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      border: none; background: var(--slate-100); cursor: pointer;
      font-size: 16px; color: var(--slate-500);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--slate-200); color: var(--slate-800); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-full { grid-column: 1 / -1; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--slate-600); text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select, .form-textarea {
      padding: 10px 13px; border-radius: 8px;
      border: 1.5px solid var(--slate-200); background: var(--slate-50);
      font-size: 14px; color: var(--slate-800); font-family: inherit;
      transition: border-color .15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--blue-400); background: white;
    }
    .form-textarea { min-height: 80px; resize: vertical; }

    .modal-footer {
      display: flex; gap: 10px; margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--slate-100);
    }
    .btn-cancel {
      flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
      color: var(--slate-600); background: var(--slate-100); border: none; cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { background: var(--slate-200); }
    .btn-save {
      flex: 2; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 700;
      color: white; background: var(--blue-600); border: none; cursor: pointer;
      transition: all .15s;
    }
    .btn-save:hover { background: var(--blue-700); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      background: var(--slate-900); color: white;
      padding: 12px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 8px;
      animation: slideInRight .25s ease;
      transition: opacity .3s;
    }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast.hidden { display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .board { grid-template-columns: 1fr; }
      .stats-bar { gap: 8px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">
      <div class="logo-mark">E</div>
      Emploia
    </a>
    <div class="nav-links">
      <a href="/app" class="btn-ghost">✨ Générer un CV</a>
      <a href="/dashboard" class="btn-ghost active">📊 Mes candidatures</a>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <div class="page-title">📋 Suivi de candidatures</div>
    <div class="page-subtitle" id="pageSubtitle">Glissez les cartes pour mettre à jour leur statut</div>
  </div>
  <button class="btn-add" onclick="openModal()">
    + Ajouter une candidature
  </button>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-icon" style="background:#eff6ff">📩</div>
    <div>
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total candidatures</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:#fefce8">🎯</div>
    <div>
      <div class="stat-num" id="statInterviews">0</div>
      <div class="stat-label">Entretiens obtenus</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:#f0fdf4">📈</div>
    <div>
      <div class="stat-num" id="statRate">—</div>
      <div class="stat-label">Taux de réponse</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:#f0fdf4">🏆</div>
    <div>
      <div class="stat-num" id="statOffers">0</div>
      <div class="stat-label">Offres reçues</div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher entreprise, poste..." oninput="renderBoard()" />
  <select class="filter-select" id="filterType" onchange="renderBoard()">
    <option value="">Tous les types</option>
    <option value="CDI">CDI</option>
    <option value="CDD">CDD</option>
    <option value="Stage">Stage</option>
    <option value="Alternance">Alternance</option>
    <option value="Freelance">Freelance</option>
  </select>
  <select class="filter-select" id="filterPriority" onchange="renderBoard()">
    <option value="">Toutes priorités</option>
    <option value="⭐">⭐ Prioritaire</option>
    <option value="🔥">🔥 Urgent</option>
  </select>
</div>

<!-- KANBAN BOARD -->
<div class="board">

  <!-- À postuler -->
  <div class="column col-todo" id="col-todo"
    ondragover="onDragOver(event)" ondrop="onDrop(event, 'todo')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title-row">
        <div class="column-dot"></div>
        <span class="column-title">À postuler</span>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('todo')" title="Ajouter">+</button>
    </div>
    <div class="column-cards" id="cards-todo"></div>
  </div>

  <!-- Postulé -->
  <div class="column col-applied" id="col-applied"
    ondragover="onDragOver(event)" ondrop="onDrop(event, 'applied')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title-row">
        <div class="column-dot"></div>
        <span class="column-title">Postulé</span>
        <span class="column-count" id="count-applied">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('applied')" title="Ajouter">+</button>
    </div>
    <div class="column-cards" id="cards-applied"></div>
  </div>

  <!-- Entretien -->
  <div class="column col-interview" id="col-interview"
    ondragover="onDragOver(event)" ondrop="onDrop(event, 'interview')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title-row">
        <div class="column-dot"></div>
        <span class="column-title">Entretien</span>
        <span class="column-count" id="count-interview">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('interview')" title="Ajouter">+</button>
    </div>
    <div class="column-cards" id="cards-interview"></div>
  </div>

  <!-- Offre / Refus -->
  <div class="column col-result" id="col-result"
    ondragover="onDragOver(event)" ondrop="onDrop(event, 'result')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title-row">
        <div class="column-dot"></div>
        <span class="column-title">Offre / Refus</span>
        <span class="column-count" id="count-result">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('result')" title="Ajouter">+</button>
    </div>
    <div class="column-cards" id="cards-result"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nouvelle candidature</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <form id="cardForm" onsubmit="saveCard(event)">
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="form-label">Entreprise *</label>
          <input type="text" class="form-input" id="fCompany" placeholder="ex. Google France" required />
        </div>
        <div class="form-group form-full">
          <label class="form-label">Intitulé du poste *</label>
          <input type="text" class="form-input" id="fTitle" placeholder="ex. Développeur Frontend React" required />
        </div>
        <div class="form-group">
          <label class="form-label">Type de contrat</label>
          <select class="form-select" id="fType">
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="Stage">Stage</option>
            <option value="Alternance">Alternance</option>
            <option value="Freelance">Freelance</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Colonne</label>
          <select class="form-select" id="fStatus">
            <option value="todo">À postuler</option>
            <option value="applied">Postulé</option>
            <option value="interview">Entretien</option>
            <option value="result">Offre / Refus</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Salaire (€/an)</label>
          <input type="text" class="form-input" id="fSalary" placeholder="ex. 42 000" />
        </div>
        <div class="form-group">
          <label class="form-label">Priorité</label>
          <select class="form-select" id="fPriority">
            <option value="">Aucune</option>
            <option value="⭐">⭐ Prioritaire</option>
            <option value="🔥">🔥 Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Télétravail</label>
          <select class="form-select" id="fRemote">
            <option value="">Non précisé</option>
            <option value="Full remote">Full remote</option>
            <option value="Hybride">Hybride</option>
            <option value="Présentiel">Présentiel</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Résultat</label>
          <select class="form-select" id="fResult">
            <option value="">En cours</option>
            <option value="accepted">✅ Offre acceptée</option>
            <option value="refused">❌ Refusé</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Lien de l'offre</label>
          <input type="url" class="form-input" id="fUrl" placeholder="https://..." />
        </div>
        <div class="form-group form-full">
          <label class="form-label">Date de candidature</label>
          <input type="date" class="form-input" id="fDate" />
        </div>
        <div class="form-group form-full">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="fNotes" placeholder="Contact RH, points clés, prochaine étape..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn-save" id="btnSave">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST -->
<div class="toast hidden" id="toast"></div>

<script>
  // ── DATA LAYER ──
  const STORAGE_KEY = 'emploia_cards_v1';

  function loadCards() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveCards(cards) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  }

  let cards = loadCards();
  let editingId = null;
  let dragId = null;

  // ── SEED DEMO DATA if empty ──
  if (cards.length === 0) {
    cards = [
      {
        id: 'demo1', status: 'applied',
        company: 'BNP Paribas', title: 'Chargé(e) de Communication Digitale',
        type: 'CDI', salary: '38 000', remote: 'Hybride', priority: '⭐',
        url: '', date: new Date(Date.now() - 3*86400000).toISOString().split('T')[0],
        notes: 'Candidature envoyée via LinkedIn. RH: Sophie Martin.', result: ''
      },
      {
        id: 'demo2', status: 'interview',
        company: 'Décathlon', title: 'Marketing Manager Digital',
        type: 'CDI', salary: '45 000', remote: 'Hybride', priority: '🔥',
        url: '', date: new Date(Date.now() - 7*86400000).toISOString().split('T')[0],
        notes: 'Entretien RH le 18 avril à 14h. Préparer cas pratique ROI campagne.', result: ''
      },
      {
        id: 'demo3', status: 'todo',
        company: 'Sephora', title: 'Social Media Manager',
        type: 'CDI', salary: '40 000', remote: 'Full remote', priority: '',
        url: '', date: '', notes: 'Offre vue sur APEC — adapter CV secteur luxe.', result: ''
      },
      {
        id: 'demo4', status: 'result',
        company: 'L\'Oréal', title: 'Brand Content Manager',
        type: 'CDI', salary: '50 000', remote: 'Hybride', priority: '',
        url: '', date: new Date(Date.now() - 14*86400000).toISOString().split('T')[0],
        notes: 'Process en 2 tours terminé. Offre reçue !', result: 'accepted'
      }
    ];
    saveCards(cards);
  }

  // ── RENDER ──
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const type = document.getElementById('filterType').value;
    const prio = document.getElementById('filterPriority').value;
    return cards.filter(c => {
      if (q && !c.company.toLowerCase().includes(q) && !c.title.toLowerCase().includes(q)) return false;
      if (type && c.type !== type) return false;
      if (prio && c.priority !== prio) return false;
      return true;
    });
  }

  function renderBoard() {
    const statuses = ['todo', 'applied', 'interview', 'result'];
    const filtered = getFiltered();

    statuses.forEach(st => {
      const container = document.getElementById('cards-' + st);
      const cols = filtered.filter(c => c.status === st);
      document.getElementById('count-' + st).textContent = cols.length;

      if (cols.length === 0) {
        const emptyMsgs = {
          todo: ['📝', 'Vos prochaines candidatures à envoyer'],
          applied: ['📬', 'Vos candidatures envoyées apparaîtront ici'],
          interview: ['🎤', 'Vos entretiens planifiés apparaîtront ici'],
          result: ['🏁', 'Vos résultats finaux apparaîtront ici']
        };
        const [icon, msg] = emptyMsgs[st];
        container.innerHTML = `<div class="column-empty"><div class="column-empty-icon">${icon}</div>${msg}</div>`;
        return;
      }

      container.innerHTML = cols.map(c => renderCard(c)).join('');
    });

    updateStats();
  }

  function renderCard(c) {
    const tags = [];
    if (c.type) tags.push(`<span class="card-tag tag-type">${c.type}</span>`);
    if (c.remote) tags.push(`<span class="card-tag tag-remote">${c.remote}</span>`);
    if (c.salary) tags.push(`<span class="card-tag tag-salary">💰 ${c.salary}€</span>`);

    const dateStr = c.date ? `Candidature le ${formatDate(c.date)}` : (c.status === 'todo' ? 'Date non fixée' : '');

    const resultBadge = c.result === 'accepted'
      ? `<div class="card-result-badge result-accepted">✅ Offre acceptée</div>`
      : c.result === 'refused'
      ? `<div class="card-result-badge result-refused">❌ Refusé</div>`
      : '';

    const urlBtn = c.url ? `<button class="card-btn" onclick="window.open('${c.url}', '_blank')" title="Voir l'offre">🔗</button>` : '';

    return `
      <div class="card" id="card-${c.id}" draggable="true"
        ondragstart="onDragStart(event, '${c.id}')"
        ondragend="onDragEnd(event)">
        ${c.priority ? `<span class="card-priority" title="Priorité" onclick="cyclePriority('${c.id}')">${c.priority}</span>` : `<span class="card-priority" style="color:var(--slate-200)" onclick="cyclePriority('${c.id}')" title="Ajouter priorité">☆</span>`}
        <div class="card-company">${escHtml(c.company)}</div>
        <div class="card-title">${escHtml(c.title)}</div>
        ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
        ${resultBadge}
        ${c.notes ? `<div class="card-notes">${escHtml(c.notes)}</div>` : ''}
        <div class="card-footer">
          <span class="card-date">${dateStr}</span>
          <div class="card-actions">
            ${urlBtn}
            <button class="card-btn" onclick="editCard('${c.id}')" title="Modifier">✏️</button>
            <button class="card-btn delete" onclick="deleteCard('${c.id}')" title="Supprimer">🗑</button>
          </div>
        </div>
      </div>
    `;
  }

  function updateStats() {
    const total = cards.length;
    const interviews = cards.filter(c => c.status === 'interview' || c.status === 'result').length;
    const offers = cards.filter(c => c.result === 'accepted').length;
    const applied = cards.filter(c => c.status === 'applied' || c.status === 'interview' || c.status === 'result').length;
    const rate = applied > 0 ? Math.round((interviews / applied) * 100) + '%' : '—';

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statInterviews').textContent = interviews;
    document.getElementById('statRate').textContent = rate;
    document.getElementById('statOffers').textContent = offers;

    const subtitle = total === 0
      ? 'Ajoutez votre première candidature pour commencer'
      : `${total} candidature${total > 1 ? 's' : ''} • ${applied} envoyée${applied > 1 ? 's' : ''}`;
    document.getElementById('pageSubtitle').textContent = subtitle;
  }

  // ── DRAG & DROP ──
  function onDragStart(e, id) {
    dragId = id;
    setTimeout(() => document.getElementById('card-' + id)?.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd(e) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging'));
    document.querySelectorAll('.column-cards').forEach(c => c.classList.remove('drag-over'));
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const col = e.currentTarget.querySelector('.column-cards');
    if (col) col.classList.add('drag-over');
  }

  function onDragLeave(e) {
    const col = e.currentTarget.querySelector('.column-cards');
    if (col) col.classList.remove('drag-over');
  }

  function onDrop(e, newStatus) {
    e.preventDefault();
    document.querySelectorAll('.column-cards').forEach(c => c.classList.remove('drag-over'));
    if (!dragId) return;
    const card = cards.find(c => c.id === dragId);
    if (card && card.status !== newStatus) {
      const oldStatus = card.status;
      card.status = newStatus;
      saveCards(cards);
      renderBoard();
      showToast(`📦 Déplacé vers "${statusLabel(newStatus)}"`);
    }
    dragId = null;
  }

  function statusLabel(st) {
    return { todo: 'À postuler', applied: 'Postulé', interview: 'Entretien', result: 'Offre / Refus' }[st] || st;
  }

  // ── MODAL ──
  function openModal(defaultStatus) {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nouvelle candidature';
    document.getElementById('btnSave').textContent = 'Ajouter';
    document.getElementById('cardForm').reset();
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    if (defaultStatus) document.getElementById('fStatus').value = defaultStatus;
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function editCard(id) {
    const c = cards.find(c => c.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Modifier la candidature';
    document.getElementById('btnSave').textContent = 'Enregistrer';
    document.getElementById('fCompany').value = c.company || '';
    document.getElementById('fTitle').value = c.title || '';
    document.getElementById('fType').value = c.type || 'CDI';
    document.getElementById('fStatus').value = c.status || 'todo';
    document.getElementById('fSalary').value = c.salary || '';
    document.getElementById('fPriority').value = c.priority || '';
    document.getElementById('fRemote').value = c.remote || '';
    document.getElementById('fResult').value = c.result || '';
    document.getElementById('fUrl').value = c.url || '';
    document.getElementById('fDate').value = c.date || '';
    document.getElementById('fNotes').value = c.notes || '';
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
    editingId = null;
  }

  function closeModalOnBg(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function saveCard(e) {
    e.preventDefault();
    const data = {
      company: document.getElementById('fCompany').value.trim(),
      title: document.getElementById('fTitle').value.trim(),
      type: document.getElementById('fType').value,
      status: document.getElementById('fStatus').value,
      salary: document.getElementById('fSalary').value.trim(),
      priority: document.getElementById('fPriority').value,
      remote: document.getElementById('fRemote').value,
      result: document.getElementById('fResult').value,
      url: document.getElementById('fUrl').value.trim(),
      date: document.getElementById('fDate').value,
      notes: document.getElementById('fNotes').value.trim(),
    };

    if (editingId) {
      const idx = cards.findIndex(c => c.id === editingId);
      if (idx !== -1) cards[idx] = { ...cards[idx], ...data };
      showToast('✅ Candidature mise à jour');
    } else {
      data.id = 'c' + Date.now();
      cards.unshift(data);
      showToast('✅ Candidature ajoutée');
    }

    saveCards(cards);
    closeModal();
    renderBoard();
  }

  // ── DELETE ──
  function deleteCard(id) {
    if (!confirm('Supprimer cette candidature ?')) return;
    cards = cards.filter(c => c.id !== id);
    saveCards(cards);
    renderBoard();
    showToast('🗑 Supprimé');
  }

  // ── PRIORITY CYCLE ──
  function cyclePriority(id) {
    const c = cards.find(c => c.id === id);
    if (!c) return;
    const cycle = ['', '⭐', '🔥'];
    const idx = cycle.indexOf(c.priority || '');
    c.priority = cycle[(idx + 1) % cycle.length];
    saveCards(cards);
    renderBoard();
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.classList.add('hidden'), 2500);
  }

  // ── UTILS ──
  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    return `${parseInt(day)} ${months[parseInt(m)-1]}`;
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
  });

  // ── INIT ──
  renderBoard();
</script>

</body>
</html>
