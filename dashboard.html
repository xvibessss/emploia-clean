<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Emploia — Dashboard · Suivi Candidatures</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;--s1:#0d1424;--s2:#111827;--s3:#1a2236;--s4:#1e2a40;
  --brd:rgba(255,255,255,.07);--brdh:rgba(255,255,255,.14);
  --blue:#3b82f6;--blb:#60a5fa;--bld:rgba(59,130,246,.1);
  --ind:#6366f1;--inb:#818cf8;--ind2:rgba(99,102,241,.1);
  --grn:#10b981;--gnb:#34d399;--gnd:rgba(16,185,129,.1);
  --ylw:#f59e0b;--ylb:#fbbf24;--yld:rgba(245,158,11,.1);
  --red:#ef4444;--rnb:#f87171;--rnd:rgba(239,68,68,.08);
  --vio:#8b5cf6;--vid:rgba(139,92,246,.1);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
}
html,body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 5% 0%,rgba(99,102,241,.08),transparent 55%);}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(4,8,15,.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--brd);}
.nav-inner{max-width:1440px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:15px;font-weight:800;color:var(--t1);text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo-m{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--ind));
        display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;}
.nav-r{display:flex;align-items:center;gap:6px;}
.nav-a{font-size:12px;font-weight:500;color:var(--t2);text-decoration:none;padding:5px 10px;border-radius:7px;transition:.15s;}
.nav-a:hover{background:var(--s3);color:var(--t1);}
.btn-add{font-size:12px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));
         border:none;cursor:pointer;padding:7px 16px;border-radius:8px;font-family:'Sora',sans-serif;transition:.15s;}
.btn-add:hover{transform:translateY(-1px);}

/* PAGE */
.page{max-width:1440px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--s1);border:1px solid var(--brd);border-radius:13px;padding:16px 18px;transition:.2s;}
.stat-card:hover{border-color:var(--brdh);}
.stat-n{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--t3);font-weight:500;}
.stat-card.s-total .stat-n{background:linear-gradient(135deg,var(--blb),var(--inb));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-card.s-int .stat-n{color:var(--gnb);}
.stat-card.s-rate .stat-n{color:var(--blb);}
.stat-card.s-off .stat-n{color:#c084fc;}
.stat-card.s-pend .stat-n{color:var(--ylb);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;padding:9px 13px;border-radius:10px;border:1.5px solid var(--brd);
              background:var(--s1);font-size:13px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;transition:.15s;}
.search-input:focus{border-color:rgba(59,130,246,.5);}
.search-input::placeholder{color:var(--t3);}
.toolbar-btns{display:flex;gap:6px;}
.btn-tb{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;
        font-family:'Sora',sans-serif;transition:.15s;display:flex;align-items:center;gap:5px;}
.btn-view{background:var(--s1);color:var(--t2);border:1px solid var(--brd);}
.btn-view:hover,.btn-view.act{background:var(--s3);color:var(--t1);}
.btn-view.act{border-color:var(--brdh);}
.btn-csv{background:var(--gnd);color:var(--gnb);border:1px solid rgba(16,185,129,.2);}
.btn-csv:hover{background:rgba(16,185,129,.15);}
.filter-select{padding:8px 12px;border-radius:9px;border:1.5px solid var(--brd);background:var(--s1);
               font-size:12px;color:var(--t2);font-family:'Sora',sans-serif;outline:none;cursor:pointer;}
.filter-select:focus{border-color:rgba(59,130,246,.5);}
.filter-select option{background:var(--s2);}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
.col{background:var(--s1);border:1px solid var(--brd);border-radius:14px;overflow:hidden;}
.col-header{padding:13px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;}
.col-ct{font-size:11px;font-weight:800;background:var(--s3);color:var(--t3);padding:2px 8px;border-radius:100px;}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px;}

/* KANBAN CARD */
.kcard{background:var(--s2);border:1px solid var(--brd);border-radius:11px;padding:13px;
       cursor:pointer;transition:.2s;position:relative;}
.kcard:hover{border-color:var(--brdh);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.kcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;}
.kcard-title{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3;flex:1;}
.kcard-co{font-size:11px;color:var(--t2);margin-bottom:6px;}
.kcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.ktag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;}
.kt-cdi{background:var(--bld);color:var(--blb);}
.kt-stage{background:var(--gnd);color:var(--gnb);}
.kt-alt{background:var(--yld);color:var(--ylb);}
.kt-cdd{background:var(--vid);color:#c4b5fd);}
.kcard-footer{display:flex;align-items:center;justify-content:space-between;}
.kcard-date{font-size:10px;color:var(--t3);}
.kcard-deadline{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;}
.kd-urgent{background:var(--rnd);color:var(--rnb);}
.kd-soon{background:var(--yld);color:var(--ylb);}
.kd-ok{background:var(--gnd);color:var(--gnb);}
.kcard-menu{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:5px;
            background:transparent;border:none;cursor:pointer;color:var(--t3);font-size:14px;
            display:flex;align-items:center;justify-content:center;transition:.15s;opacity:0;}
.kcard:hover .kcard-menu{opacity:1;}
.kcard-menu:hover{background:var(--s3);color:var(--t1);}

/* LIST VIEW */
.list-view{display:none;}
.list-view.show{display:block;}
.list-table{width:100%;border-collapse:collapse;}
.list-table th{padding:10px 14px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;
               letter-spacing:.6px;text-align:left;border-bottom:1px solid var(--brd);background:var(--s1);}
.list-table td{padding:12px 14px;font-size:12px;color:var(--t2);border-bottom:1px solid var(--brd);
               vertical-align:middle;}
.list-table tr:hover td{background:rgba(255,255,255,.02);}
.list-table tr:last-child td{border-bottom:none;}
.lt-title{font-weight:700;color:var(--t1);}
.lt-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
           padding:3px 8px;border-radius:6px;}
.ls-app{background:var(--bld);color:var(--blb);}
.ls-rel{background:var(--yld);color:var(--ylb);}
.ls-int{background:var(--gnd);color:var(--gnb);}
.ls-off{background:var(--ind2);color:var(--inb);}
.ls-rej{background:var(--rnd);color:var(--rnb);}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:400;background:rgba(4,8,15,.8);backdrop-filter:blur(10px);
         display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:var(--s1);border:1px solid var(--brdh);border-radius:18px;padding:28px;
       width:100%;max-width:500px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-title{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:20px;letter-spacing:-.4px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.mf input,.mf select,.mf textarea{width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid var(--brd);
  background:var(--bg);font-size:13px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;transition:.15s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:rgba(59,130,246,.5);}
.mf select option{background:var(--s2);}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.btn-save{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:800;color:#fff;
          background:linear-gradient(135deg,var(--blue),var(--ind));border:none;cursor:pointer;
          font-family:'Sora',sans-serif;transition:.15s;}
.btn-save:hover{transform:translateY(-1px);}
.btn-cancel{padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;color:var(--t2);
            background:var(--s3);border:1px solid var(--brd);cursor:pointer;font-family:'Sora',sans-serif;}
.btn-delete{padding:11px 16px;border-radius:10px;font-size:13px;font-weight:700;color:var(--rnb);
            background:var(--rnd);border:1px solid rgba(239,68,68,.2);cursor:pointer;font-family:'Sora',sans-serif;}
.btn-gen-cv{width:100%;padding:10px;border-radius:9px;font-size:12px;font-weight:700;color:var(--gnb);
            background:var(--gnd);border:1px solid rgba(16,185,129,.2);cursor:pointer;font-family:'Sora',sans-serif;
            margin-top:8px;transition:.15s;}
.btn-gen-cv:hover{background:rgba(16,185,129,.15);}

/* EMPTY STATE */
.kanban-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
              padding:60px;text-align:center;}
.ke-icon{font-size:48px;margin-bottom:16px;}
.ke-title{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:8px;}
.ke-sub{font-size:13px;color:var(--t3);max-width:300px;line-height:1.7;}

/* COL COLORS */
.col-c1 .col-header{border-top:3px solid var(--blue);}
.col-c2 .col-header{border-top:3px solid var(--ylw);}
.col-c3 .col-header{border-top:3px solid var(--grn);}
.col-c4 .col-header{border-top:3px solid var(--vio);}

@media(max-width:1000px){.kanban{grid-template-columns:1fr 1fr;}.stats-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.kanban{grid-template-columns:1fr;}.stats-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-m">E</div>Emploia</a>
    <div class="nav-r">
      <a href="/jobs" class="nav-a">🔍 Offres</a>
      <a href="/app" class="nav-a">✨ Générateur</a>
      <button class="btn-add" onclick="openModal()">+ Ajouter</button>
    </div>
  </div>
</nav>

<div class="page">

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card s-total"><div class="stat-n" id="st-total">0</div><div class="stat-label">Total candidatures</div></div>
    <div class="stat-card s-int"><div class="stat-n" id="st-int">0</div><div class="stat-label">Entretiens obtenus</div></div>
    <div class="stat-card s-rate"><div class="stat-n" id="st-rate">0%</div><div class="stat-label">Taux de réponse</div></div>
    <div class="stat-card s-off"><div class="stat-n" id="st-off">0</div><div class="stat-label">Offres reçues</div></div>
    <div class="stat-card s-pend"><div class="stat-n" id="st-pend">0</div><div class="stat-label">En attente</div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input class="search-input" id="searchInp" placeholder="🔍 Rechercher poste, entreprise…" oninput="renderAll()"/>
    <select class="filter-select" id="filterStatus" onchange="renderAll()">
      <option value="">Tous les statuts</option>
      <option value="Postulé">Postulé</option>
      <option value="Relancé">Relancé</option>
      <option value="Entretien">Entretien</option>
      <option value="Offre">Offre</option>
      <option value="Refusé">Refusé</option>
    </select>
    <select class="filter-select" id="filterType" onchange="renderAll()">
      <option value="">Tous types</option>
      <option value="CDI">CDI</option>
      <option value="CDD">CDD</option>
      <option value="Stage">Stage</option>
      <option value="Alternance">Alternance</option>
    </select>
    <div class="toolbar-btns">
      <button class="btn-tb btn-view act" id="btnKanban" onclick="setView('kanban')">⊞ Kanban</button>
      <button class="btn-tb btn-view" id="btnList" onclick="setView('list')">☰ Liste</button>
      <button class="btn-tb btn-csv" onclick="exportCSV()">⬇️ CSV</button>
    </div>
  </div>

  <!-- KANBAN -->
  <div class="kanban" id="kanbanView">
    <div class="col col-c1">
      <div class="col-header">
        <div class="col-title">💙 Postulé <span class="col-ct" id="ct-app">0</span></div>
      </div>
      <div class="col-body" id="col-app"></div>
    </div>
    <div class="col col-c2">
      <div class="col-header">
        <div class="col-title">💛 Relancé <span class="col-ct" id="ct-rel">0</span></div>
      </div>
      <div class="col-body" id="col-rel"></div>
    </div>
    <div class="col col-c3">
      <div class="col-header">
        <div class="col-title">💚 Entretien <span class="col-ct" id="ct-int">0</span></div>
      </div>
      <div class="col-body" id="col-int"></div>
    </div>
    <div class="col col-c4">
      <div class="col-header">
        <div class="col-title">💜 Offre/Refusé <span class="col-ct" id="ct-fin">0</span></div>
      </div>
      <div class="col-body" id="col-fin"></div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <div style="background:var(--s1);border:1px solid var(--brd);border-radius:14px;overflow:hidden;">
      <table class="list-table">
        <thead>
          <tr>
            <th>Poste</th><th>Entreprise</th><th>Type</th><th>Statut</th><th>Deadline</th><th>Date</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">➕ Nouvelle candidature</div>
    <input type="hidden" id="editId"/>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="mf"><label>Titre du poste *</label><input id="mTitle" placeholder="Product Manager"/></div>
      <div class="mf"><label>Entreprise *</label><input id="mCompany" placeholder="Doctolib"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="mf"><label>Type de contrat</label>
        <select id="mType">
          <option>CDI</option><option>CDD</option><option>Stage</option><option>Alternance</option><option>Freelance</option>
        </select>
      </div>
      <div class="mf"><label>Statut</label>
        <select id="mStatus">
          <option>Postulé</option><option>Relancé</option><option>Entretien</option><option>Offre</option><option>Refusé</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="mf"><label>Ville</label><input id="mCity" placeholder="Paris"/></div>
      <div class="mf"><label>Salaire / Rémunération</label><input id="mSalary" placeholder="45 000€ / 1 200€"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="mf"><label>Date de candidature</label><input id="mDate" type="date"/></div>
      <div class="mf"><label>Date limite relance</label><input id="mDeadline" type="date"/></div>
    </div>
    <div class="mf"><label>Notes</label><textarea id="mNotes" rows="2" placeholder="Recruteur, ref offre, impressions…"></textarea></div>
    <div class="mf"><label>Lien de l'offre</label><input id="mUrl" type="url" placeholder="https://…"/></div>
    <button class="btn-gen-cv" onclick="genCVForModal()">✨ Générer un CV pour ce poste</button>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalDirect()">Annuler</button>
      <button class="btn-delete" id="btnDelete" onclick="deleteApp()" style="display:none">🗑 Supprimer</button>
      <button class="btn-save" onclick="saveApp()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
let apps = JSON.parse(localStorage.getItem('emp_apps') || '[]');
let view = 'kanban';

const STATUS_COL = {
  'Postulé':'app', 'Relancé':'rel', 'Entretien':'int',
  'Offre':'fin', 'Refusé':'fin'
};
const STATUS_CLS = {
  'Postulé':'ls-app','Relancé':'ls-rel','Entretien':'ls-int','Offre':'ls-off','Refusé':'ls-rej'
};
const TYPE_CLS = {'CDI':'kt-cdi','Stage':'kt-stage','Alternance':'kt-alt','CDD':'kt-cdd'};

function save(){ localStorage.setItem('emp_apps', JSON.stringify(apps)); }

function getFiltered(){
  const q = document.getElementById('searchInp').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const ty = document.getElementById('filterType').value;
  return apps.filter(a =>
    (!q || a.title.toLowerCase().includes(q) || a.company.toLowerCase().includes(q)) &&
    (!st || a.status === st) &&
    (!ty || a.type === ty)
  );
}

function renderAll(){
  const filtered = getFiltered();
  renderStats(filtered);
  if(view==='kanban') renderKanban(filtered);
  else renderList(filtered);
}

function renderStats(filtered){
  const total = filtered.length;
  const ints = filtered.filter(a=>a.status==='Entretien').length;
  const offs = filtered.filter(a=>a.status==='Offre').length;
  const pend = filtered.filter(a=>a.status==='Postulé'||a.status==='Relancé').length;
  const resp = filtered.filter(a=>a.status!=='Postulé').length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-int').textContent = ints;
  document.getElementById('st-rate').textContent = total ? Math.round(resp/total*100)+'%' : '0%';
  document.getElementById('st-off').textContent = offs;
  document.getElementById('st-pend').textContent = pend;
}

function renderKanban(filtered){
  const cols = {app:[],rel:[],int:[],fin:[]};
  filtered.forEach(a => { const c = STATUS_COL[a.status]||'app'; cols[c].push(a); });
  Object.entries(cols).forEach(([key,items]) => {
    const el = document.getElementById('col-'+key);
    document.getElementById('ct-'+key).textContent = items.length;
    if(!items.length){
      el.innerHTML = '<div style="text-align:center;padding:20px;font-size:11px;color:var(--t3)">Aucune candidature</div>';
      return;
    }
    el.innerHTML = items.map(a => {
      const dl = deadlineClass(a.deadline);
      return `<div class="kcard" onclick="openModal('${a.id}')">
        <button class="kcard-menu" onclick="event.stopPropagation();openModal('${a.id}')">⋯</button>
        <div class="kcard-top">
          <div>
            <div class="kcard-title">${esc(a.title)}</div>
            <div class="kcard-co">${esc(a.company)}${a.city?' · '+esc(a.city):''}</div>
          </div>
        </div>
        <div class="kcard-tags">
          <span class="ktag ${TYPE_CLS[a.type]||'kt-cdi'}">${esc(a.type||'CDI')}</span>
          ${a.salary?`<span class="ktag" style="background:var(--gnd);color:var(--gnb)">${esc(a.salary)}</span>`:''}
        </div>
        <div class="kcard-footer">
          <span class="kcard-date">${a.date||''}</span>
          ${a.deadline?`<span class="kcard-deadline ${dl.cls}">⏰ ${dl.label}</span>`:''}
        </div>
      </div>`;
    }).join('');
  });
}

function renderList(filtered){
  const el = document.getElementById('listBody');
  if(!filtered.length){
    el.innerHTML='<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--t3)">Aucune candidature</td></tr>';
    return;
  }
  el.innerHTML = filtered.map(a => {
    const dl = a.deadline ? deadlineClass(a.deadline) : null;
    return `<tr onclick="openModal('${a.id}')" style="cursor:pointer">
      <td class="lt-title">${esc(a.title)}</td>
      <td>${esc(a.company)}</td>
      <td><span class="ktag ${TYPE_CLS[a.type]||'kt-cdi'}">${esc(a.type||'CDI')}</span></td>
      <td><span class="lt-status ${STATUS_CLS[a.status]||'ls-app'}">${esc(a.status||'Postulé')}</span></td>
      <td>${dl?`<span class="kcard-deadline ${dl.cls}">⏰ ${dl.label}</span>`:''}</td>
      <td style="color:var(--t3)">${a.date||''}</td>
    </tr>`;
  }).join('');
}

function deadlineClass(deadline){
  if(!deadline) return {cls:'',label:''};
  const days = Math.ceil((new Date(deadline)-new Date())/(1000*60*60*24));
  if(days<0) return {cls:'kd-urgent',label:'Expiré'};
  if(days===0) return {cls:'kd-urgent',label:'Auj.'};
  if(days<=3) return {cls:'kd-urgent',label:days+'j'};
  if(days<=7) return {cls:'kd-soon',label:days+'j'};
  return {cls:'kd-ok',label:days+'j'};
}

function setView(v){
  view=v;
  document.getElementById('kanbanView').style.display = v==='kanban'?'grid':'none';
  document.getElementById('listView').classList.toggle('show', v==='list');
  document.getElementById('btnKanban').classList.toggle('act',v==='kanban');
  document.getElementById('btnList').classList.toggle('act',v==='list');
  renderAll();
}

// MODAL
function openModal(id){
  document.getElementById('editId').value = id||'';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
  if(id){
    const a = apps.find(x=>x.id===id);
    if(!a) return;
    document.getElementById('modalTitle').textContent = '✏️ Modifier la candidature';
    document.getElementById('mTitle').value   = a.title||'';
    document.getElementById('mCompany').value = a.company||'';
    document.getElementById('mType').value    = a.type||'CDI';
    document.getElementById('mStatus').value  = a.status||'Postulé';
    document.getElementById('mCity').value    = a.city||'';
    document.getElementById('mSalary').value  = a.salary||'';
    document.getElementById('mDate').value    = a.date||'';
    document.getElementById('mDeadline').value= a.deadline||'';
    document.getElementById('mNotes').value   = a.notes||'';
    document.getElementById('mUrl').value     = a.url||'';
  } else {
    document.getElementById('modalTitle').textContent = '➕ Nouvelle candidature';
    ['mTitle','mCompany','mCity','mSalary','mNotes','mUrl'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('mType').value = 'CDI';
    document.getElementById('mStatus').value = 'Postulé';
    document.getElementById('mDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('mDeadline').value = '';
  }
  document.getElementById('overlay').classList.add('show');
}

function closeModal(e){ if(e.target===document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('overlay').classList.remove('show'); }

function saveApp(){
  const title = document.getElementById('mTitle').value.trim();
  const company = document.getElementById('mCompany').value.trim();
  if(!title||!company){ alert('Titre et entreprise requis.'); return; }

  const id = document.getElementById('editId').value;
  const data = {
    id: id||Date.now().toString(),
    title, company,
    type:     document.getElementById('mType').value,
    status:   document.getElementById('mStatus').value,
    city:     document.getElementById('mCity').value,
    salary:   document.getElementById('mSalary').value,
    date:     document.getElementById('mDate').value,
    deadline: document.getElementById('mDeadline').value,
    notes:    document.getElementById('mNotes').value,
    url:      document.getElementById('mUrl').value,
  };

  if(id){ const i=apps.findIndex(x=>x.id===id); if(i>=0) apps[i]=data; else apps.push(data); }
  else apps.unshift(data);

  save(); renderAll(); closeModalDirect();
}

function deleteApp(){
  const id = document.getElementById('editId').value;
  if(id && confirm('Supprimer cette candidature ?')){ apps=apps.filter(x=>x.id!==id); save(); renderAll(); closeModalDirect(); }
}

function genCVForModal(){
  const title = document.getElementById('mTitle').value;
  const company = document.getElementById('mCompany').value;
  if(!title){ alert('Renseignez d\'abord le titre du poste.'); return; }
  sessionStorage.setItem('emp_prefill', JSON.stringify({title,company}));
  window.location.href = '/app';
}

function exportCSV(){
  const h = 'Poste,Entreprise,Type,Statut,Ville,Salaire,Date,Deadline,Notes,URL';
  const rows = apps.map(a =>
    [a.title,a.company,a.type,a.status,a.city,a.salary,a.date,a.deadline,a.notes,a.url]
    .map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')
  );
  const blob = new Blob([[h,...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `emploia-candidatures-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openModal();}
});
