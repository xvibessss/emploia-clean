<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nouveau mot de passe · Emploia</title>
  <meta name="robots" content="noindex,nofollow"/>
    
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="/shared.css"/>
  <style>
    body { background: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .rp-card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 24px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,.15);
    }
    .rp-logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg,var(--primary),var(--brand-purple));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 700; color: var(--ink); text-align: center; margin: 0 0 6px; letter-spacing: -.5px; }
    .rp-sub { font-size: 13px; color: var(--slate); text-align: center; margin: 0 0 28px; line-height: 1.5; }
    .rp-field { margin-bottom: 16px; }
    .rp-field label { display: block; font-size: 11px; font-weight: 700; color: var(--steel); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .rp-field input {
      width: 100%; padding: 12px 14px; border-radius: 11px;
      border: 1.5px solid var(--hairline); background: var(--canvas);
      font-size: 14px; color: var(--ink); font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .15s; box-sizing: border-box;
    }
    .rp-field input:focus { border-color: var(--primary); }
    .rp-strength { height: 4px; border-radius: 2px; background: var(--hairline-soft); margin-top: 6px; overflow: hidden; }
    .rp-strength-bar { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0%; }
    .rp-error { padding: 10px 12px; border-radius: 8px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: var(--error); font-size: 12.5px; margin-bottom: 14px; display: none; }
    .rp-btn {
      width: 100%; padding: 13px; border-radius: 12px;
      font-size: 14px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg,var(--primary),var(--brand-purple)); border: none; cursor: pointer;
      font-family: var(--f-ui); transition: all .2s;
      box-shadow: 0 6px 18px rgba(99,102,241,.35);
    }
    .rp-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.45); }
    .rp-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .rp-success { text-align: center; display: none; }
    .rp-success-icon { font-size: 52px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="empToasts" class="emp-toast-container"></div>

<div class="rp-card">
  <div class="rp-logo">E</div>

  <div id="rpForm">
    <h1>Nouveau mot de passe</h1>
    <p class="rp-sub">Choisissez un mot de passe solide pour sécuriser votre compte.</p>

    <div class="rp-field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="rpPassword" placeholder="8 car. min, 1 majuscule, 1 chiffre" autocomplete="new-password" oninput="rpStrength(this.value)"/>
      <div class="rp-strength"><div class="rp-strength-bar" id="rpBar"></div></div>
    </div>
    <div class="rp-field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="rpConfirm" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div class="rp-error" id="rpError"></div>
    <button class="rp-btn" id="rpBtn" onclick="rpSubmit()">Enregistrer le nouveau mot de passe</button>
  </div>

  <div class="rp-success" id="rpSuccess">
    <div class="rp-success-icon">🎉</div>
    <h1>Mot de passe modifié !</h1>
    <p class="rp-sub">Vous êtes connecté. Redirection vers votre dashboard…</p>
  </div>
</div>

<script src="shared.js"></script>
<script>
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    document.getElementById('rpForm').innerHTML = `
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h1>Lien invalide</h1>
        <p class="rp-sub">Ce lien de réinitialisation est invalide ou a expiré.</p>
        <a href="/" style="display:inline-block;margin-top:16px;color:var(--blb);font-weight:700;font-size:14px">Retour à l'accueil</a>
      </div>`;
  }

  function rpStrength(pwd) {
    const bar = document.getElementById('rpBar');
    if (!bar) return;
    const score = [pwd.length >= 8, /[A-Z]/.test(pwd), /[0-9]/.test(pwd), pwd.length >= 12, /[^a-zA-Z0-9]/.test(pwd)].filter(Boolean).length;
    const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
    bar.style.width = (score * 20) + '%';
    bar.style.background = colors[score - 1] || '#ef4444';
  }

  async function rpSubmit() {
    const password = document.getElementById('rpPassword').value;
    const confirm = document.getElementById('rpConfirm').value;
    const errEl = document.getElementById('rpError');
    const btn = document.getElementById('rpBtn');

    errEl.style.display = 'none';
    if (!password) { errEl.textContent = 'Entrez un mot de passe'; errEl.style.display = 'block'; return; }
    if (password !== confirm) { errEl.textContent = 'Les mots de passe ne correspondent pas'; errEl.style.display = 'block'; return; }
    if (password.length < 8) { errEl.textContent = 'Mot de passe trop court (8 caractères min)'; errEl.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = 'Enregistrement…';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur');
      document.getElementById('rpForm').style.display = 'none';
      document.getElementById('rpSuccess').style.display = 'block';
      setTimeout(() => { window.location.href = '/dashboard'; }, 2000);
    } catch (err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Enregistrer le nouveau mot de passe';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') rpSubmit(); });
</script>
</body>
</html>
