<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Fond dégradé -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Cercles décoratifs en fond -->
  <circle cx="1050" cy="120" r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="180" r="140" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="500" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- Grille de points décoratifs -->
  <g opacity="0.12">
    <circle cx="800" cy="80" r="3" fill="white"/>
    <circle cx="840" cy="80" r="3" fill="white"/>
    <circle cx="880" cy="80" r="3" fill="white"/>
    <circle cx="800" cy="120" r="3" fill="white"/>
    <circle cx="840" cy="120" r="3" fill="white"/>
    <circle cx="880" cy="120" r="3" fill="white"/>
    <circle cx="800" cy="160" r="3" fill="white"/>
    <circle cx="840" cy="160" r="3" fill="white"/>
    <circle cx="880" cy="160" r="3" fill="white"/>
  </g>

  <!-- Logo icon (document + spark) -->
  <rect x="80" y="160" width="90" height="112" rx="14" fill="rgba(255,255,255,0.18)"/>
  <rect x="80" y="160" width="90" height="112" rx="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Lignes doc -->
  <rect x="97" y="195" width="38" height="7" rx="3.5" fill="white" opacity="0.9"/>
  <rect x="97" y="212" width="56" height="7" rx="3.5" fill="white" opacity="0.55"/>
  <rect x="97" y="229" width="48" height="7" rx="3.5" fill="white" opacity="0.55"/>
  <rect x="97" y="246" width="34" height="7" rx="3.5" fill="white" opacity="0.35"/>
  <!-- Badge IA -->
  <circle cx="158" cy="175" r="20" fill="#0f172a"/>
  <circle cx="158" cy="175" r="18" fill="url(#spark)"/>
  <path d="M158 162 L160 171 L169 173 L160 175 L158 184 L156 175 L147 173 L156 171 Z" fill="white"/>

  <!-- Wordmark -->
  <text x="190" y="238" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="white">Emploi</text>
  <text x="538" y="238" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="#60a5fa">IA</text>

  <!-- Tagline principale -->
  <text x="80" y="300" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.75)" letter-spacing="-0.3">Trouve un emploi 3x plus vite avec l'IA</text>

  <!-- Séparateur -->
  <rect x="80" y="332" width="80" height="3" rx="1.5" fill="#60a5fa" opacity="0.8"/>

  <!-- 3 features en bas -->
  <rect x="80" y="368" width="300" height="90" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="105" y="405" font-family="Inter, Arial, sans-serif" font-size="28" fill="white">📄</text>
  <text x="148" y="403" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="white">CV Optimisé ATS</text>
  <text x="148" y="424" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Passe les filtres automatiques</text>

  <rect x="410" y="368" width="300" height="90" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="435" y="405" font-family="Inter, Arial, sans-serif" font-size="28" fill="white">✉️</text>
  <text x="478" y="403" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Lettre de motivation</text>
  <text x="478" y="424" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Personnalisée à 100%</text>

  <rect x="740" y="368" width="300" height="90" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="765" y="405" font-family="Inter, Arial, sans-serif" font-size="28" fill="white">🎯</text>
  <text x="808" y="403" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Score ATS</text>
  <text x="808" y="424" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Résultat en 30 secondes</text>

  <!-- Badge FR + URL -->
  <rect x="80" y="492" width="164" height="34" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="104" y="514" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="white">🇫🇷 100% en français</text>

  <rect x="264" y="492" width="168" height="34" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="284" y="514" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="white">✓ Sans carte bancaire</text>

  <!-- URL -->
  <text x="1120" y="600" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="end">emploia.fr</text>
</svg>
