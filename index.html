      { "@type": "Question", "name": "Emploia est-il gratuit ?", "acceptedAnswer": { "@type": "Answer", "text": "Oui, Emploia est gratuit avec 5 générations IA offertes. La version Pro est à 9€/mois avec un essai de 7 jours gratuit." } },
      { "@type": "Question", "name": "Emploia fonctionne-t-il pour les stages et alternances ?", "acceptedAnswer": { "@type": "Answer", "text": "Oui, Emploia est conçu pour tous les types de contrats français : CDI, CDD, stage, alternance. Les CV et lettres sont adaptés au marché français." } }

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#04080f;--bg2:#070c18;--bg3:#0a1020;
      --s1:#111827;--s2:#1a2236;--s3:#1e2a40;
      --brd:rgba(255,255,255,.06);--brdh:rgba(255,255,255,.12);
      --blue:#3b82f6;--blb:#60a5fa;--bld:rgba(59,130,246,.1);
      --ind:#6366f1;--inb:#818cf8;--ind2:rgba(99,102,241,.1);
      --grn:#10b981;--gnb:#34d399;--gnd:rgba(16,185,129,.1);
      --ylw:#f59e0b;--ylb:#fbbf24;
      --red:#ef4444;--rnb:#f87171;--rnd:rgba(239,68,68,.08);
      --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

    /* GRAIN */
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.022;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 24px;}
    .nav-pill{max-width:1100px;margin:0 auto;background:rgba(4,8,15,.82);backdrop-filter:blur(24px);border:1px solid var(--brd);border-radius:100px;padding:0 8px 0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-size:16px;font-weight:800;color:var(--t1);text-decoration:none;display:flex;align-items:center;gap:10px;letter-spacing:-.4px;}
    .logo-m{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--ind));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.4);}
    .beta{font-size:9px;font-weight:800;letter-spacing:1px;background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2);padding:2px 8px;border-radius:100px;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-a{font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;padding:7px 14px;border-radius:100px;transition:all .15s;}
    .nav-a:hover{color:var(--t1);background:rgba(255,255,255,.06);}
    .btn-nav{font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));border:none;cursor:pointer;padding:9px 20px;border-radius:100px;text-decoration:none;transition:all .2s;box-shadow:0 2px 12px rgba(99,102,241,.3);}
    .btn-nav:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.5);}

    /* HERO */
    .hero{padding:150px 24px 80px;text-align:center;position:relative;overflow:hidden;}
    .g1{position:absolute;top:-200px;left:50%;transform:translateX(-65%);width:900px;height:900px;background:radial-gradient(circle,rgba(99,102,241,.18) 0%,transparent 65%);pointer-events:none;}
    .g2{position:absolute;top:-100px;left:50%;transform:translateX(-25%);width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,.12) 0%,transparent 65%);pointer-events:none;}
    .g3{position:absolute;bottom:-200px;left:5%;width:500px;height:500px;background:radial-gradient(circle,rgba(16,185,129,.06) 0%,transparent 65%);pointer-events:none;}

    .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--rnd);border:1px solid rgba(239,68,68,.18);color:var(--rnb);font-size:12px;font-weight:700;padding:7px 16px;border-radius:100px;margin-bottom:32px;animation:fadeUp .6s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    h1{font-size:clamp(42px,6.5vw,80px);font-weight:900;line-height:1.03;letter-spacing:-3px;margin-bottom:28px;animation:fadeUp .7s .1s ease both;}
    .strike{color:var(--t3);text-decoration:line-through;text-decoration-color:rgba(239,68,68,.5);text-decoration-thickness:3px;}
    .grad{background:linear-gradient(135deg,var(--blb) 0%,var(--inb) 40%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    .hero-sub{font-size:19px;color:var(--t2);max-width:560px;margin:0 auto 44px;line-height:1.75;animation:fadeUp .7s .2s ease both;}
    .hero-sub strong{color:var(--t1);font-weight:600;}

    /* HERO QUICK SEARCH */
    .hero-search{max-width:680px;margin:0 auto 36px;background:var(--s1);border:1px solid var(--brdh);border-radius:16px;padding:14px;animation:fadeUp .7s .25s ease both;}
    .hs-row{display:flex;gap:8px;}
    .hs-input{flex:1;padding:12px 16px;border-radius:10px;border:1.5px solid var(--brd);background:var(--bg);font-size:14px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;transition:border-color .15s;}
    .hs-input:focus{border-color:var(--blue);}
    .hs-input::placeholder{color:var(--t3);}
    .hs-btn{padding:12px 22px;border-radius:10px;font-size:14px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));border:none;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}
    .hs-tabs{display:flex;gap:6px;margin-top:10px;}
    .hs-tab{padding:6px 14px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;}
    .hs-tab:hover,.hs-tab.active{color:#fff;border-color:transparent;}
    .hs-tab[data-t="tous"].active{background:var(--s2);color:var(--t1);}
    .hs-tab[data-t="stage"].active{background:var(--grn);}
    .hs-tab[data-t="alternance"].active{background:var(--ylw);}
    .hs-tab[data-t="cdi"].active{background:var(--blue);}
    .hs-tab[data-t="cdd"].active{background:var(--ind);}

    .hero-ctas{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;animation:fadeUp .7s .3s ease both;}
    .btn-hero{padding:16px 36px;border-radius:14px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));border:none;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 6px 30px rgba(99,102,241,.42);display:inline-flex;align-items:center;gap:8px;}
    .btn-hero:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(99,102,241,.6);}
    .btn-ghost{padding:15px 26px;border-radius:14px;font-size:15px;font-weight:600;color:var(--t2);background:rgba(255,255,255,.04);border:1px solid var(--brd);cursor:pointer;text-decoration:none;transition:all .2s;}
    .btn-ghost:hover{border-color:var(--brdh);color:var(--t1);}

    .hero-proof{margin-top:20px;font-size:12px;color:var(--t3);display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;animation:fadeUp .7s .4s ease both;}
    .hero-proof span{display:flex;align-items:center;gap:5px;}
    .ck{color:var(--grn);}

    /* STATS */
    .stats-band{margin:56px auto 0;max-width:720px;background:var(--s1);border:1px solid var(--brd);border-radius:18px;display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;animation:fadeUp .7s .45s ease both;}
    .sb{padding:20px 14px;text-align:center;border-right:1px solid var(--brd);}
    .sb:last-child{border-right:none;}
    .sb-num{font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--blb),var(--inb));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sb-label{font-size:11px;color:var(--t3);margin-top:3px;}

    /* MOCKUP */
    .mockup-wrap{margin:56px auto 0;max-width:900px;animation:fadeUp .8s .5s ease both;}
    .mockup{background:var(--bg2);border:1px solid var(--brdh);border-radius:18px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08);}
    .mbar{background:rgba(255,255,255,.03);border-bottom:1px solid var(--brd);padding:12px 18px;display:flex;align-items:center;gap:8px;}
    .md{width:11px;height:11px;border-radius:50%;}
    .murl{margin-left:12px;background:rgba(255,255,255,.05);border-radius:7px;padding:4px 14px;font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;flex:1;max-width:260px;}
    .mtabs{margin-left:auto;display:flex;gap:4px;}
    .mtab{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;color:var(--t3);border:1px solid var(--brd);}
    .mtab.act{background:var(--bld);color:var(--blb);border-color:rgba(59,130,246,.2);}
    .mbody{padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .mp{background:rgba(255,255,255,.02);border:1px solid var(--brd);border-radius:12px;padding:18px;}
    .ml{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
    .mline{height:7px;border-radius:4px;background:rgba(255,255,255,.05);margin-bottom:8px;}
    .mol{font-size:10px;font-weight:700;color:var(--blb);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .mats{font-size:9px;font-weight:800;background:var(--gnd);color:var(--gnb);border:1px solid rgba(16,185,129,.2);padding:2px 8px;border-radius:4px;}
    .mchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;}
    .mc{font-size:10px;font-weight:600;padding:3px 10px;border-radius:6px;}
    .mcg{background:var(--gnd);color:var(--gnb);}.mcb{background:var(--bld);color:var(--blb);}.mcv{background:var(--ind2);color:var(--inb);}
    .mbtn{width:100%;padding:11px;border-radius:9px;font-size:12px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));border:none;margin-top:14px;font-family:'Sora',sans-serif;}
    .msc{background:linear-gradient(135deg,var(--blue),var(--ind));border-radius:10px;padding:14px 16px;margin-top:12px;}
    .mscr{display:flex;align-items:baseline;gap:6px;}
    .mscn{font-size:36px;font-weight:900;color:#fff;letter-spacing:-2px;}
    .mscd{font-size:14px;color:rgba(255,255,255,.6);font-weight:600;}
    .mscb{background:rgba(255,255,255,.2);border-radius:3px;height:4px;margin-top:10px;overflow:hidden;}
    .mscf{height:100%;background:#fff;border-radius:3px;width:94%;}

    /* STORYTELLING */
    .story{padding:100px 24px;position:relative;overflow:hidden;}
    .story-inner{max-width:1000px;margin:0 auto;}
    .story-timeline{display:flex;flex-direction:column;gap:0;}
    .story-item{display:grid;grid-template-columns:80px 1fr;gap:32px;padding:48px 0;border-bottom:1px solid var(--brd);position:relative;}
    .story-item:last-child{border-bottom:none;}
    .story-step{display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:4px;}
    .story-num{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--ind));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.35);flex-shrink:0;}
    .story-line{width:2px;flex:1;background:linear-gradient(180deg,rgba(99,102,241,.3),transparent);}
    .story-content{}
    .story-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
    .sb-bad{background:var(--rnd);color:var(--rnb);border:1px solid rgba(239,68,68,.15);}
    .sb-good{background:var(--gnd);color:var(--gnb);border:1px solid rgba(16,185,129,.15);}
    .story-title{font-size:clamp(22px,2.5vw,32px);font-weight:800;color:var(--t1);letter-spacing:-.8px;margin-bottom:12px;line-height:1.2;}
    .story-text{font-size:15px;color:var(--t2);line-height:1.8;max-width:580px;}
    .story-text strong{color:var(--t1);}
    .story-visual{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:20px;margin-top:20px;max-width:480px;}
    .sv-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
    .sv-stat{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--brd);}
    .sv-stat:last-child{border-bottom:none;}
    .sv-stat-label{font-size:13px;color:var(--t2);}
    .sv-stat-val{font-size:13px;font-weight:700;color:var(--t1);}
    .sv-bar{height:6px;border-radius:3px;background:var(--s3);margin-top:6px;overflow:hidden;}
    .sv-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--ind));}

    /* JOBS PREVIEW */
    .jobs-preview{padding:80px 24px;background:rgba(255,255,255,.015);border-top:1px solid var(--brd);}
    .jobs-preview-inner{max-width:1100px;margin:0 auto;}
    .jobs-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px;}
    .jp-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r, 12px);padding:20px;transition:all .2s;}
    .jp-card:hover{border-color:var(--brdh);transform:translateY(-2px);}
    .jp-logo{width:38px;height:38px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;}
    .jp-type{font-size:10px;font-weight:800;padding:3px 9px;border-radius:100px;margin-bottom:8px;display:inline-block;}
    .jp-cdi{background:var(--bld);color:var(--blb);}
    .jp-stage{background:var(--gnd);color:var(--gnb);}
    .jp-alt{background:rgba(245,158,11,.1);color:var(--ylb);}
    .jp-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px;}
    .jp-co{font-size:12px;color:var(--t2);margin-bottom:10px;}
    .jp-footer{display:flex;align-items:center;justify-content:space-between;}
    .jp-loc{font-size:11px;color:var(--t3);}
    .jp-sal{font-size:11px;color:var(--gnb);font-weight:600;}
    .btn-see-all{display:inline-flex;align-items:center;gap:8px;margin-top:36px;padding:13px 28px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--blue),var(--ind));border:none;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,.3);}
    .btn-see-all:hover{transform:translateY(-1px);}

    /* FEATURES */
    .features{padding:80px 24px;border-top:1px solid var(--brd);}
    .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:52px;}
    .feat-card{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:28px 24px;transition:all .25s;position:relative;overflow:hidden;}
    .feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--ind));opacity:0;transition:opacity .25s;}
    .feat-card:hover{border-color:var(--brdh);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
    .feat-card:hover::before{opacity:1;}
    .feat-icon{width:48px;height:48px;border-radius:13px;background:var(--bld);border:1px solid rgba(59,130,246,.15);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px;}
    .feat-card h3{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:10px;}
    .feat-card p{font-size:13px;color:var(--t2);line-height:1.7;}
    .feat-badge{display:inline-block;margin-top:14px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--inb);background:var(--ind2);border:1px solid rgba(99,102,241,.2);padding:3px 10px;border-radius:6px;}

    /* TESTIMONIALS */
    .testi{padding:80px 24px;background:rgba(255,255,255,.01);border-top:1px solid var(--brd);}
    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:52px;}
    .testi-card{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:26px;transition:border-color .2s;}
    .testi-card:hover{border-color:var(--brdh);}
    .stars{color:var(--ylb);font-size:13px;letter-spacing:2px;margin-bottom:14px;}
    .testi-text{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:20px;font-style:italic;}
    .testi-author{display:flex;align-items:center;gap:11px;}
    .testi-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--ind));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0;}
    .testi-name{font-size:13px;font-weight:700;color:var(--t1);}
    .testi-role{font-size:11px;color:var(--t3);margin-top:2px;}

    /* PRICING */
    .pricing{padding:80px 24px;}
    .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px;margin:52px auto 0;}
    .pc{background:var(--s1);border:1px solid var(--brd);border-radius:18px;padding:36px 28px;position:relative;transition:all .2s;}
    .pc:hover{transform:translateY(-2px);}
    .pc.pop{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.05);box-shadow:0 0 0 1px rgba(99,102,241,.15),0 20px 60px rgba(99,102,241,.12);}
    .pop-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--blue),var(--ind));color:#fff;font-size:10px;font-weight:800;padding:4px 16px;border-radius:100px;white-space:nowrap;}

<script>
  // Mobile nav
  function toggleMobileNav() {
    const nav = document.getElementById('mobileNav');
    const btn = document.getElementById('hamburger');
    nav.classList.toggle('open');
    btn.classList.toggle('open');
  }
  document.addEventListener('click', e => {
    const nav = document.getElementById('mobileNav');
    const btn = document.getElementById('hamburger');
    if (!nav.contains(e.target) && !btn.contains(e.target)) {
      nav.classList.remove('open');
      btn.classList.remove('open');
    }
  });
  // Close mobile nav on link click
  document.querySelectorAll('.mobile-nav a').forEach(a => a.addEventListener('click', () => {
    document.getElementById('mobileNav').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }));

  // Copyright year
  document.getElementById('yr').textContent = new Date().getFullYear();

  // Hero search
  let hsActiveType = 'tous';
  function hsType(btn) {
    document.querySelectorAll('.hs-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    hsActiveType = btn.dataset.t;
  }
  function heroSearch() {
    const q = document.getElementById('hsInput').value.trim();
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (hsActiveType !== 'tous') params.set('type', hsActiveType);
    window.location.href = '/jobs?' + params.toString();
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('hsInput').addEventListener('keydown', e => { if(e.key==='Enter') heroSearch(); });
  });

  // FAQ
  function faq(el) {
    const item = el.closest('.faq-item');
    const was = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));
    if (!was) item.classList.add('open');
  }

  // Scroll reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  document.querySelectorAll('.feat-card,.testi-card,.pc,.jp-card,.story-item').forEach(el => {
    el.style.opacity='0'; el.style.transform='translateY(16px)'; el.style.transition='opacity .5s ease,transform .5s ease';
    obs.observe(el);
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';} });
    }, {threshold:0.1});
    io.observe(el);
  });

  // Payment modal
  let currentPlan = 'pro';
  function openPayment(plan, price, name) {
    currentPlan = plan;
    document.getElementById('pmPlanName').textContent = name;
    document.getElementById('pmPrice').textContent = price;
    document.getElementById('pmPlanPrice').textContent = price;
    document.getElementById('payOverlay').classList.add('vis');
  }
  function closePayment() { document.getElementById('payOverlay').classList.remove('vis'); }
  function closePayOnBg(e) { if(e.target===document.getElementById('payOverlay')) closePayment(); }

  async function startCheckout() {
    const email = document.getElementById('pmEmail').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('pmEmail').style.borderColor = '#ef4444';
      setTimeout(()=>document.getElementById('pmEmail').style.borderColor='',2000);
      return;
    }
    const btn = document.getElementById('pmPayBtn');
    btn.disabled = true; btn.textContent = '⏳ Redirection vers Stripe...';
    try {
      const res = await fetch('/api/stripe-checkout', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ plan: currentPlan, email }),
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else if (data.demo) {
        btn.textContent = '✅ Mode démo — ' + (data.message || '');
        setTimeout(()=>window.location.href='/app?plan='+currentPlan, 2000);
      } else {
        throw new Error(data.error || 'Erreur');
      }
    } catch(e) {
      btn.disabled = false; btn.textContent = '⚠️ Erreur — Réessayez';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Démarrer l\'essai gratuit →'; }, 3000);
    }
  }

  document.addEventListener('keydown', e => { if(e.key==='Escape') closePayment(); });
</script>

<script>
  const _ck='emploia_cookie_consent';
  // Show banner only if no consent recorded
  if(!localStorage.getItem(_ck)) document.getElementById('cookieBanner').style.display='flex';
