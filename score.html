<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon score ATS — Emploia</title>
  <meta name="description" content="Découvrez mon score ATS sur Emploia — l'outil IA qui optimise votre CV pour passer les filtres automatiques des recruteurs."/>
  <link rel="canonical" href="https://emploia.fr/score"/>
  <meta name="robots" content="noindex"/>

  <!-- OG / Social sharing -->
  <meta property="og:title" content="Mon score ATS — Emploia" id="og-title"/>
  <meta property="og:description" content="J'ai analysé mon CV avec Emploia. Et toi ?" id="og-desc"/>
  <meta property="og:image" content="https://emploia.fr/opengraph.svg"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Mon score ATS — Emploia" id="tw-title"/>
  <meta name="twitter:description" content="J'ai analysé mon CV avec Emploia. Et toi ?" id="tw-desc"/>
  <meta name="twitter:image" content="https://emploia.fr/opengraph.svg"/>

  <!-- Shared design system — CSS variables, fonts, resets -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="shared.css"/>

  <style>
    /* ── Page layout ──────────────────────────────────── */
    .score-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--bg, #04080f);
    }

    /* ── Card ─────────────────────────────────────────── */
    .score-card {
      background: var(--s1, #0d1424);
      border: 1px solid var(--brd, rgba(255,255,255,.07));
      border-radius: var(--r3, 20px);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 24px 64px rgba(0,0,0,.5);
    }

    /* ── Header logo + title ──────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      color: var(--t1, #f1f5f9);
      letter-spacing: -0.4px;
    }

    .card-subtitle {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2, #94a3b8);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Gauge circle ─────────────────────────────────── */
    .gauge-wrap {
      position: relative;
      width: 160px;
      height: 160px;
    }

    .gauge-svg {
      width: 160px;
      height: 160px;
      transform: rotate(-90deg);
    }

    .gauge-track {
      fill: none;
      stroke: var(--s3, #1a2236);
      stroke-width: 10;
    }

    .gauge-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 408; /* 2π × 65 ≈ 408 */
      stroke-dashoffset: 408; /* starts empty, JS animates */
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1), stroke 0.3s;
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .gauge-number {
      font-size: 40px;
      font-weight: 800;
      color: var(--t1, #f1f5f9);
      letter-spacing: -2px;
      line-height: 1;
    }

    .gauge-total {
      font-size: 13px;
      color: var(--t2, #94a3b8);
      font-weight: 500;
    }

    /* ── Score text block ─────────────────────────────── */
    .score-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--t1, #f1f5f9);
      text-align: center;
    }

    .score-message {
      font-size: 13px;
      color: var(--t2, #94a3b8);
      text-align: center;
      line-height: 1.6;
      max-width: 340px;
    }

    /* ── Share buttons ────────────────────────────────── */
    .share-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .share-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t3, #475569);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-share {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: var(--r, 12px);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--brd, rgba(255,255,255,.07));
      background: var(--s2, #111827);
      color: var(--t1, #f1f5f9);
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      white-space: nowrap;
    }

    .btn-share:hover {
      background: var(--s3, #1a2236);
      border-color: var(--brdh, rgba(255,255,255,.13));
      transform: translateY(-1px);
    }

    .btn-share:active { transform: translateY(0); }

    .btn-share svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-share.copied {
      border-color: var(--grn, #10b981);
      color: var(--grn, #10b981);
    }

    /* ── CTA ──────────────────────────────────────────── */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--r, 12px);
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: opacity 0.18s, transform 0.12s;
      border: none;
      cursor: pointer;
    }

    .cta-btn:hover { opacity: .9; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    /* ── Fine print ───────────────────────────────────── */
    .fine-print {
      font-size: 11px;
      color: var(--t3, #475569);
      text-align: center;
      line-height: 1.6;
      max-width: 340px;
    }

    /* ── Divider ──────────────────────────────────────── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--brd, rgba(255,255,255,.07));
    }

    /* ── Error / loading states ───────────────────────── */
    .state-msg {
      font-size: 15px;
      color: var(--t2, #94a3b8);
      text-align: center;
    }

    .state-error {
      color: var(--red, #ef4444);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 520px) {
      .score-card { padding: 36px 24px; }
      .share-buttons { flex-direction: column; align-items: stretch; }
      .btn-share { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="score-page">
    <div class="score-card" id="card">
      <!-- Header -->
      <div class="card-header">
        <a href="https://emploia.fr" class="card-logo">
          <div class="logo-mark">E</div>
          <span class="logo-text">Emploia</span>
        </a>
        <span class="card-subtitle">Score ATS</span>
      </div>

      <!-- Loading state -->
      <p class="state-msg" id="loading-msg">Chargement du score…</p>

      <!-- Score content — hidden until loaded -->
      <div id="score-content" style="display:none; width:100%; display:none; flex-direction:column; align-items:center; gap:28px;">

        <!-- Gauge circle -->
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 160 160">
            <circle class="gauge-track" cx="80" cy="80" r="65"/>
            <circle class="gauge-fill" id="gauge-fill" cx="80" cy="80" r="65"/>
          </svg>
          <div class="gauge-center">
            <span class="gauge-number" id="gauge-number">0</span>
            <span class="gauge-total">/100</span>
          </div>
        </div>

        <!-- Score label & message -->
        <p class="score-label" id="score-label">Score ATS de votre candidature</p>
        <p class="score-message" id="score-message"></p>

        <div class="divider"></div>

        <!-- Share buttons -->
        <div class="share-section">
          <p class="share-label">Partager</p>
          <div class="share-buttons">
            <a href="#" class="btn-share" id="btn-linkedin" target="_blank" rel="noopener">
              <!-- LinkedIn icon -->
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
              LinkedIn
            </a>
            <a href="#" class="btn-share" id="btn-twitter" target="_blank" rel="noopener">
              <!-- X/Twitter icon -->
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
              X / Twitter
            </a>
            <button class="btn-share" id="btn-copy" type="button">
              <!-- Link icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              <span id="copy-label">Copier le lien</span>
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- CTA -->
        <a href="https://emploia.fr/app" class="cta-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
          Analyse ton CV gratuitement
        </a>

        <!-- Fine print -->
        <p class="fine-print">
          Score calculé par l'IA Emploia en analysant les mots-clés,
          le format et la structure de votre CV.
        </p>
        <p style="margin-top:16px;text-align:center">
          <a href="https://emploia.fr" style="font-size:12px;color:var(--t3,#94a3b8);text-decoration:none">← Retour à l'accueil</a>
        </p>
      </div>

      <!-- Error state — hidden until needed -->
      <p class="state-msg state-error" id="error-msg" style="display:none;">
        Score introuvable ou expiré.
      </p>
    </div>
  </main>

  <script>
    (function () {
      // ── Helpers ────────────────────────────────────────────────────
      const CIRCUMFERENCE = 2 * Math.PI * 65; // ≈ 408.41

      function scoreColor(score) {
        if (score >= 80) return '#10b981'; // green
        if (score >= 60) return '#f97316'; // orange
        return '#ef4444';                  // red
      }

      function scoreMessage(score) {
        if (score >= 80) return 'Excellent score ! Ce CV passe les filtres ATS';
        if (score >= 60) return 'Score correct — améliorable pour maximiser les chances';
        return 'Score insuffisant — la plupart des ATS filtrent ce CV';
      }

      function animateCounter(el, target, duration) {
        const start = performance.now();
        function step(now) {
          const progress = Math.min((now - start) / duration, 1);
          // ease-out cubic
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.round(eased * target);
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function animateGauge(fillEl, score, duration) {
        const target = CIRCUMFERENCE * (1 - score / 100);
        const start = performance.now();
        fillEl.style.strokeDashoffset = CIRCUMFERENCE; // reset
        function step(now) {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          fillEl.style.strokeDashoffset = CIRCUMFERENCE - eased * (CIRCUMFERENCE - target);
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      // ── Fetch & render ─────────────────────────────────────────────
      const token = window.location.pathname.split('/').pop();
      const pageUrl = window.location.href;

      async function loadScore() {
        if (!token) { showError(); return; }

        let data;
        try {
          const res = await fetch('/api/share-score?token=' + encodeURIComponent(token));
          if (res.status === 404) { showError(); return; }
          if (!res.ok) { showError(); return; }
          data = await res.json();
        } catch {
          showError();
          return;
        }

        renderScore(data);
      }

      function renderScore({ score, jobTitle }) {
        const color = scoreColor(score);
        const label = jobTitle ? 'Score ATS de ' + jobTitle : 'Score ATS de votre candidature';
        const message = scoreMessage(score);

        // Update meta OG tags
        const ogTitle = 'J\'ai obtenu ' + score + '/100 sur Emploia !';
        document.getElementById('og-title').setAttribute('content', ogTitle + ' — Emploia');
        document.getElementById('og-desc').setAttribute('content', 'Analyse ton CV gratuitement avec Emploia et optimise-le pour les ATS.');
        document.getElementById('tw-title').setAttribute('content', ogTitle);
        document.getElementById('tw-desc').setAttribute('content', 'Analyse ton CV gratuitement avec Emploia.');
        document.title = ogTitle + ' — Emploia';

        // DOM updates
        document.getElementById('score-label').textContent = label;
        document.getElementById('score-message').textContent = message;

        const gaugeFill = document.getElementById('gauge-fill');
        gaugeFill.style.stroke = color;
        gaugeFill.style.strokeDasharray = CIRCUMFERENCE;

        // Share links
        const tweetText = 'J\'ai obtenu ' + score + '/100 sur Emploia ! Analyse ton CV gratuitement 👇';
        document.getElementById('btn-linkedin').href =
          'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(pageUrl);
        document.getElementById('btn-twitter').href =
          'https://twitter.com/intent/tweet?text=' + encodeURIComponent(tweetText) +
          '&url=' + encodeURIComponent(pageUrl);

        document.getElementById('btn-copy').addEventListener('click', () => {
          navigator.clipboard.writeText(pageUrl).then(() => {
            const lbl = document.getElementById('copy-label');
            const btn = document.getElementById('btn-copy');
            lbl.textContent = 'Lien copié !';
            btn.classList.add('copied');
            setTimeout(() => {
              lbl.textContent = 'Copier le lien';
              btn.classList.remove('copied');
            }, 2000);
          });
        });

        // Show content, hide loader
        document.getElementById('loading-msg').style.display = 'none';
        const content = document.getElementById('score-content');
        content.style.display = 'flex';

        // Animate
        animateCounter(document.getElementById('gauge-number'), score, 1200);
        animateGauge(gaugeFill, score, 1200);
      }

      function showError() {
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
      }

      loadScore();
    })();
  </script>
</body>
</html>
